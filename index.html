<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="My OS"/>
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>My OS</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #ffffff;
      --bg2:      #f5f4f0;
      --bg3:      #eeedea;
      --text:     #1a1a18;
      --text2:    #6b6b66;
      --text3:    #a0a09a;
      --border:   rgba(0,0,0,0.10);
      --border2:  rgba(0,0,0,0.18);
      --radius:   12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);

      /* section accent colors */
      --faith:         #534AB7;
      --faith-light:   #EEEDFE;
      --faith-mid:     #AFA9EC;
      --workout:       #1D9E75;
      --workout-light: #E1F5EE;
      --workout-mid:   #5DCAA5;
      --relate:        #D4537E;
      --relate-light:  #FBEAF0;
      --relate-mid:    #ED93B1;
      --self:          #BA7517;
      --self-light:    #FAEEDA;
      --self-mid:      #EF9F27;
      --health:        #378ADD;
      --health-light:  #E6F1FB;
      --health-mid:    #85B7EB;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #1a1a18;
        --bg2:     #252522;
        --bg3:     #2e2e2b;
        --text:    #f0efe8;
        --text2:   #a0a09a;
        --text3:   #6b6b66;
        --border:  rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.18);
      }
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── App shell ────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
    }
    #screen {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 16px;
    }
    /* hide scrollbar */
    #screen::-webkit-scrollbar { display: none; }

    /* ── Top bar ──────────────────────────────────────────────── */
    .top-bar {
      padding: 12px 16px 10px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
    }
    .greeting {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }
    .date-line {
      font-size: 12px;
      color: var(--text3);
      margin-top: 1px;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 10px;
    }
    .stat-chip {
      background: var(--bg2);
      border-radius: 8px;
      padding: 7px 6px;
      text-align: center;
    }
    .stat-num {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .stat-lbl {
      font-size: 10px;
      color: var(--text3);
      margin-top: 3px;
    }

    /* ── Big 3 ────────────────────────────────────────────────── */
    .big3-block {
      margin: 10px 14px 0;
      background: var(--faith-light);
      border-radius: var(--radius);
      padding: 10px 12px;
      border: 0.5px solid var(--faith-mid);
    }
    .big3-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--faith);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .big3-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .big3-item:last-child { margin-bottom: 0; }
    .b3-box {
      width: 16px; height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--faith);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .b3-box.done { background: var(--faith); border-color: var(--faith); }
    .b3-box.done::after {
      content: '';
      width: 8px; height: 4px;
      border-left: 1.5px solid #fff;
      border-bottom: 1.5px solid #fff;
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }
    .b3-text { font-size: 13px; color: var(--faith); }
    .b3-text.done { text-decoration: line-through; opacity: 0.6; }

    /* ── Sections ─────────────────────────────────────────────── */
    .section {
      margin: 8px 14px 0;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .sec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .sec-left { display: flex; align-items: center; gap: 8px; }
    .sec-dot {
      width: 9px; height: 9px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .sec-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .sec-meta { font-size: 11px; color: var(--text3); margin-left: 4px; }
    .sec-chevron {
      font-size: 12px; color: var(--text3);
      transition: transform .2s;
      display: inline-block;
    }
    .sec-chevron.open { transform: rotate(90deg); }
    .sec-body { border-top: 0.5px solid var(--border); }
    .section.collapsed .sec-body { display: none; }

    /* ── Habit rows ───────────────────────────────────────────── */
    .habit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .habit-row:last-child { border-bottom: none; }
    .habit-left { display: flex; align-items: center; gap: 10px; }
    .hcheck {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .hcheck.done { border-color: transparent; }
    .hcheck.done::after {
      content: '';
      width: 10px; height: 6px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }
    .habit-name { font-size: 14px; color: var(--text); transition: color .15s; }
    .habit-name.done { color: var(--text3); text-decoration: line-through; }
    .streak-wrap {
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--text3);
    }
    .streak-fire {
      width: 10px; height: 10px;
      border-radius: 50% 50% 50% 10%;
      background: #EF9F27;
      display: inline-block;
    }

    /* ── Sync indicator ───────────────────────────────────────── */
    #sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text3);
      display: inline-block;
      margin-left: 6px;
      vertical-align: middle;
      transition: background .3s;
    }
    #sync-dot.syncing { background: #EF9F27; }
    #sync-dot.synced  { background: #1D9E75; }
    #sync-dot.error   { background: #E24B4A; }

    /* ── Bottom nav ───────────────────────────────────────────── */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 8px 0 6px;
      border-top: 0.5px solid var(--border);
      background: var(--bg);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 4px 14px;
      border-radius: 10px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .nav-item.active { background: var(--bg2); }
    .nav-icon { width: 22px; height: 22px; }
    .nav-lbl { font-size: 10px; color: var(--text3); }
    .nav-item.active .nav-lbl { color: var(--text); font-weight: 500; }

    /* ── Toast ────────────────────────────────────────────────── */
    #toast {
      position: absolute;
      bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--bg);
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Loading ──────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      z-index: 999;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--faith);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: var(--text3); }
  </style>
</head>

<!-- ─────────────────────────────────────────────────────────────
     APP LOGIC
     ──────────────────────────────────────────────────────────── -->
<script>
// ── Date helpers ────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function weekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  return `${d.getFullYear()}-W${String(Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7)).padStart(2,'0')}`;
}
function formatDate(d) {
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  return "Good evening";
}

// ── Local state ─────────────────────────────────────────────────
// Storage key for today's completions
function storageKey() { return `habitlog-${todayKey()}`; }
function big3Key()    { return `big3-${weekKey()}`; }

function loadTodayLog() {
  try { return JSON.parse(localStorage.getItem(storageKey()) || '{}'); }
  catch { return {}; }
}
function saveTodayLog(log) {
  localStorage.setItem(storageKey(), JSON.stringify(log));
}
function loadBig3Done() {
  try { return JSON.parse(localStorage.getItem(big3Key()) || '{}'); }
  catch { return {}; }
}
function saveBig3Done(done) {
  localStorage.setItem(big3Key(), JSON.stringify(done));
}

// ── Week score ──────────────────────────────────────────────────
function calcWeekScore() {
  const allHabits = CONFIG.sections.flatMap(s => s.habits.map(h => h.id));
  const total     = allHabits.length * 7;
  let done = 0;
  const today = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    // go back to Monday of current week
    const day = today.getDay() || 7;
    d.setDate(today.getDate() - day + 1 + i);
    const key = `habitlog-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    try {
      const log = JSON.parse(localStorage.getItem(key) || '{}');
      done += Object.values(log).filter(Boolean).length;
    } catch {}
  }
  return total > 0 ? Math.round((done / total) * 100) : 0;
}

// ── Render ───────────────────────────────────────────────────────
let log     = loadTodayLog();
let b3done  = loadBig3Done();

function renderGreeting() {
  document.getElementById('greeting').textContent = `${getGreeting()}, ${CONFIG.name}`;
  document.getElementById('date-line').textContent = formatDate(new Date());
}

function renderBig3() {
  const el = document.getElementById('big3-list');
  el.innerHTML = '';
  CONFIG.big3.forEach(item => {
    const done = !!b3done[item.id];
    const row  = document.createElement('div');
    row.className = 'big3-item';
    row.innerHTML = `
      <div class="b3-box ${done ? 'done' : ''}"></div>
      <span class="b3-text ${done ? 'done' : ''}">${item.text}</span>`;
    row.addEventListener('click', () => {
      b3done[item.id] = !b3done[item.id];
      saveBig3Done(b3done);
      renderBig3();
    });
    el.appendChild(row);
  });
}

function renderSections() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  CONFIG.sections.forEach(section => {
    const doneCount  = section.habits.filter(h => log[h.id]).length;
    const totalCount = section.habits.length;
    const collapsed  = section._collapsed !== undefined ? section._collapsed : section.collapsed;

    const wrap = document.createElement('div');
    wrap.className = `section${collapsed ? ' collapsed' : ''}`;
    wrap.id = `sec-${section.id}`;

    // Header
    const header = document.createElement('div');
    header.className = 'sec-header';
    header.innerHTML = `
      <div class="sec-left">
        <div class="sec-dot" style="background:${section.color};"></div>
        <span class="sec-name">${section.name}</span>
        <span class="sec-meta">${doneCount}/${totalCount}</span>
      </div>
      <span class="sec-chevron ${collapsed ? '' : 'open'}">&#9654;</span>`;
    header.addEventListener('click', () => {
      section._collapsed = !wrap.classList.contains('collapsed');
      renderSections();
    });
    wrap.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'sec-body';
    section.habits.forEach(habit => {
      const done = !!log[habit.id];
      const row  = document.createElement('div');
      row.className = 'habit-row';
      row.innerHTML = `
        <div class="habit-left">
          <div class="hcheck ${done ? 'done' : ''}" style="${done ? `background:${section.color};` : ''}"></div>
          <span class="habit-name ${done ? 'done' : ''}">${habit.name}</span>
        </div>
        <div class="streak-wrap">
          ${habit.streak > 0 ? `<div class="streak-fire" style="background:${section.color};"></div> ${habit.streak}` : '— 0'}
        </div>`;
      row.addEventListener('click', () => toggleHabit(habit.id, section.color));
      body.appendChild(row);
    });
    wrap.appendChild(body);
    container.appendChild(wrap);
  });
}

function renderStats() {
  const allHabits = CONFIG.sections.flatMap(s => s.habits);
  const doneToday = allHabits.filter(h => log[h.id]).length;
  const allStreaks = allHabits.map(h => h.streak);
  const bestStreak = allStreaks.length ? Math.max(...allStreaks) : 0;
  const weekScore  = calcWeekScore();

  document.getElementById('stat-done').textContent   = doneToday;
  document.getElementById('stat-streak').textContent  = bestStreak;
  document.getElementById('stat-week').textContent    = weekScore + '%';
}

function renderAll() {
  renderGreeting();
  renderBig3();
  renderSections();
  renderStats();
}

// ── Toggle habit ─────────────────────────────────────────────────
function toggleHabit(habitId, color) {
  log[habitId] = !log[habitId];
  saveTodayLog(log);
  renderAll();
  syncToSupabase();
}

// ── Supabase sync ────────────────────────────────────────────────
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  dot.className = '';
  dot.classList.add(status);
}

async function syncToSupabase() {
  if (!USE_SUPABASE) return;
  setSyncStatus('syncing');
  try {
    const payload = {
      date:        todayKey(),
      log:         log,
      updated_at:  new Date().toISOString(),
    };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/habit_logs?date=eq.${todayKey()}`, {
      method:  'PUT',
      headers: {
        'apikey':        SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type':  'application/json',
        'Prefer':        'resolution=merge-duplicates',
      },
      body: JSON.stringify(payload),
    });
    setSyncStatus(res.ok ? 'synced' : 'error');
  } catch {
    setSyncStatus('error');
  }
}

async function loadFromSupabase() {
  if (!USE_SUPABASE) return;
  setSyncStatus('syncing');
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/habit_logs?date=eq.${todayKey()}&select=log`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (res.ok) {
      const data = await res.json();
      if (data.length > 0 && data[0].log) {
        log = data[0].log;
        saveTodayLog(log);
      }
    }
    setSyncStatus('synced');
  } catch {
    setSyncStatus('error');
  }
}

// ── Navigation (stub — build out in v2) ─────────────────────────
function navigate(tab) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if (tab !== 'today') {
    showToast(`${tab.charAt(0).toUpperCase() + tab.slice(1)} view coming in v2`);
  }
}

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Midnight reset ────────────────────────────────────────────────
function scheduleMidnightReset() {
  const now       = new Date();
  const midnight  = new Date(now);
  midnight.setDate(now.getDate() + 1);
  midnight.setHours(0, 0, 5, 0); // 5 seconds past midnight
  const msUntil   = midnight - now;
  setTimeout(() => {
    log = {};
    renderAll();
    scheduleMidnightReset();
  }, msUntil);
}

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  await loadFromSupabase();
  renderAll();
  scheduleMidnightReset();
  document.getElementById('loading').classList.add('hidden');
}

init();
</script>
