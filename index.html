<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="My OS"/>
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>My OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #ffffff;
      --bg2:      #f5f4f0;
      --bg3:      #eeedea;
      --text:     #1a1a18;
      --text2:    #6b6b66;
      --text3:    #a0a09a;
      --border:   rgba(0,0,0,0.10);
      --border2:  rgba(0,0,0,0.18);
      --radius:   12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #1a1a18;
        --bg2:     #252522;
        --bg3:     #2e2e2b;
        --text:    #f0efe8;
        --text2:   #a0a09a;
        --text3:   #6b6b66;
        --border:  rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.18);
      }
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
    }

    /* screens */
    .screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 16px; display: none; }
    .screen.active { display: block; }
    .screen::-webkit-scrollbar { display: none; }

    /* top bar */
    .top-bar { padding: 12px 16px 10px; border-bottom: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .greeting { font-size: 20px; font-weight: 600; color: var(--text); }
    .date-line { font-size: 12px; color: var(--text3); margin-top: 1px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
    .stat-chip { background: var(--bg2); border-radius: 8px; padding: 7px 6px; text-align: center; }
    .stat-num { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1; }
    .stat-lbl { font-size: 10px; color: var(--text3); margin-top: 3px; }

    /* week bar */
    .week-bar { padding: 10px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .week-nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .week-nav-btn { font-size: 24px; color: var(--text2); cursor: pointer; padding: 0 8px; user-select: none; -webkit-tap-highlight-color: transparent; }
    .week-nav-center { text-align: center; }
    .week-nav-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .week-nav-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .week-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }

    /* big 3 */
    .big3-block { margin: 10px 14px 0; background: #EEEDFE; border-radius: var(--radius); padding: 10px 12px; border: 0.5px solid #AFA9EC; }
    @media (prefers-color-scheme: dark) {
      .big3-block { background: #26215C; border-color: #534AB7; }
    }
    .big3-title { font-size: 10px; font-weight: 600; color: #534AB7; letter-spacing: 0.05em; margin-bottom: 8px; }
    .big3-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .big3-item:last-child { margin-bottom: 0; }
    .b3-box { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #534AB7; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .b3-box.done { background: #534AB7; border-color: #534AB7; }
    .b3-box.done::after { content: ''; width: 8px; height: 4px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(-45deg) translateY(-1px); display: block; }
    .b3-text { font-size: 13px; color: #3C3489; }
    @media (prefers-color-scheme: dark) { .b3-text { color: #CECBF6; } }
    .b3-text.done { text-decoration: line-through; opacity: 0.6; }

    /* sections */
    .section { margin: 8px 14px 0; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .sec-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
    .sec-left { display: flex; align-items: center; gap: 8px; }
    .sec-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
    .sec-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .sec-meta { font-size: 11px; color: var(--text3); margin-left: 4px; }
    .sec-chevron { font-size: 12px; color: var(--text3); transition: transform .2s; display: inline-block; }
    .sec-chevron.open { transform: rotate(90deg); }
    .sec-body { border-top: 0.5px solid var(--border); }
    .section.collapsed .sec-body { display: none; }

    /* habit rows */
    .habit-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-bottom: 0.5px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .habit-row:last-child { border-bottom: none; }
    .habit-left { display: flex; align-items: center; gap: 10px; }
    .hcheck { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .hcheck.done { border-color: transparent; }
    .hcheck.done::after { content: ''; width: 10px; height: 6px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translateY(-1px); display: block; }
    .habit-name { font-size: 14px; color: var(--text); transition: color .15s; }
    .habit-name.done { color: var(--text3); text-decoration: line-through; }
    .streak-wrap { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text3); }
    .streak-fire { width: 10px; height: 10px; border-radius: 50% 50% 50% 10%; background: #EF9F27; display: inline-block; }

    /* week grid */
    .week-section { margin: 10px 14px 0; }
    .week-sec-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.05em; margin-bottom: 5px; }
    .habit-grid-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .grid-header-row { display: grid; grid-template-columns: 1fr repeat(7, 28px); padding: 5px 10px; border-bottom: 0.5px solid var(--border); }
    .grid-day-lbl { text-align: center; font-size: 10px; font-weight: 600; color: var(--text3); }
    .grid-day-lbl.is-today { color: var(--text); }
    .grid-habit-row { display: grid; grid-template-columns: 1fr repeat(7, 28px); align-items: center; padding: 5px 10px; border-bottom: 0.5px solid var(--border); }
    .grid-habit-row:last-child { border-bottom: none; }
    .grid-habit-name { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 4px; }
    .grid-dot-wrap { display: flex; align-items: center; justify-content: center; }
    .gdot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border2); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all .12s; flex-shrink: 0; }
    .gdot.done { border-color: transparent; }
    .gdot.is-today { border-style: dashed; }
    .gdot.is-future { opacity: 0.2; border-style: dashed; cursor: default; pointer-events: none; }

    /* big 3 progress */
    .b3-prog-card { background: #EEEDFE; border: 0.5px solid #AFA9EC; border-radius: var(--radius); padding: 10px 12px; }
    @media (prefers-color-scheme: dark) { .b3-prog-card { background: #26215C; border-color: #534AB7; } }
    .b3-prog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .b3-prog-row:last-child { margin-bottom: 0; }
    .b3-prog-info { flex: 1; min-width: 0; }
    .b3-prog-name { font-size: 12px; color: #3C3489; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    @media (prefers-color-scheme: dark) { .b3-prog-name { color: #CECBF6; } }
    .b3-prog-bg { height: 4px; background: #AFA9EC; border-radius: 2px; }
    .b3-prog-fill { height: 4px; background: #534AB7; border-radius: 2px; transition: width .3s; }
    .b3-prog-pct { font-size: 11px; font-weight: 600; color: #7F77DD; min-width: 30px; text-align: right; }

    /* day scores */
    .day-score-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-score-chip { background: var(--bg2); border-radius: 8px; padding: 6px 2px; text-align: center; }
    .day-score-chip.is-today { background: var(--bg3); border: 0.5px solid var(--border2); }
    .ds-lbl { font-size: 9px; font-weight: 600; color: var(--text3); }
    .ds-lbl.is-today { color: var(--text); }
    .ds-num { font-size: 13px; font-weight: 600; margin-top: 2px; }

    /* sync dot */
    #sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); display: inline-block; margin-left: 6px; vertical-align: middle; transition: background .3s; }
    #sync-dot.syncing { background: #EF9F27; }
    #sync-dot.synced  { background: #1D9E75; }
    #sync-dot.error   { background: #E24B4A; }

    /* bottom nav */
    .bottom-nav { display: flex; justify-content: space-around; padding: 8px 0 6px; border-top: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 14px; border-radius: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .15s; }
    .nav-item.active { background: var(--bg2); }
    .nav-icon { width: 22px; height: 22px; }
    .nav-lbl { font-size: 10px; color: var(--text3); }
    .nav-item.active .nav-lbl { color: var(--text); font-weight: 500; }

    /* toast */
    #toast { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); font-size: 13px; padding: 8px 16px; border-radius: 20px; opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap; z-index: 100; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* loading */
    #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 999; }
    #loading.hidden { display: none; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: #534AB7; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: var(--text3); }

    /* ── Projects ─────────────────────────────────────────────── */
    .proj-top-bar { padding: 10px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .proj-top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .proj-view-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
    .filter-row::-webkit-scrollbar { display: none; }
    .fchip { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 10px; border: 0.5px solid var(--border2); color: var(--text2); white-space: nowrap; cursor: pointer; background: var(--bg); transition: all .15s; -webkit-tap-highlight-color: transparent; }
    .fchip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .role-group { margin: 10px 14px 0; }
    .role-group-header { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
    .role-group-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .role-group-name { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.05em; }
    .role-group-count { font-size: 10px; color: var(--text3); }
    .proj-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .proj-card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .proj-card-left { display: flex; align-items: center; gap: 9px; flex: 1; min-width: 0; }
    .proj-icon { width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .proj-info { min-width: 0; flex: 1; }
    .proj-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proj-meta { font-size: 10px; color: var(--text3); margin-top: 1px; }
    .proj-card-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .status-pill { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 8px; }
    .s-active { background: #EAF3DE; color: #27500A; }
    .s-paused { background: #FAEEDA; color: #633806; }
    .s-done   { background: #E1F5EE; color: #085041; }
    .s-deck   { background: var(--bg2); color: var(--text2); }
    @media (prefers-color-scheme: dark) {
      .s-active { background: #173404; color: #C0DD97; }
      .s-paused { background: #412402; color: #FAC775; }
      .s-done   { background: #04342C; color: #9FE1CB; }
    }
    .proj-chevron { font-size: 11px; color: var(--text3); transition: transform .2s; display: inline-block; }
    .proj-chevron.open { transform: rotate(90deg); }
    .proj-card-body { border-top: 0.5px solid var(--border); }
    .proj-card.collapsed .proj-card-body { display: none; }
    .proj-progress { padding: 7px 12px 4px; }
    .proj-prog-bg { height: 3px; background: var(--border2); border-radius: 2px; }
    .proj-prog-fill { height: 3px; border-radius: 2px; transition: width .3s; }
    .proj-prog-lbl { font-size: 10px; color: var(--text3); margin-top: 3px; }
    .task-row { display: flex; align-items: center; gap: 9px; padding: 8px 12px; border-bottom: 0.5px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .task-row:last-of-type { border-bottom: none; }
    .task-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .12s; }
    .task-check.done { border-color: transparent; }
    .task-check.done::after { content: ''; width: 9px; height: 5px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(-45deg) translateY(-1px); display: block; }
    .task-text { font-size: 13px; color: var(--text); flex: 1; }
    .task-text.done { color: var(--text3); text-decoration: line-through; }
    .task-due { font-size: 10px; color: var(--text3); white-space: nowrap; }
    .task-due.soon { color: #BA7517; }
    .add-task-row { display: flex; align-items: center; gap: 9px; padding: 7px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; border-top: 0.5px solid var(--border); }
    .add-task-icon { width: 18px; height: 18px; border-radius: 4px; border: 1.5px dashed var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 14px; line-height: 1; }
    .add-task-text { font-size: 13px; color: var(--text3); }
    .new-task-wrap { display: none; padding: 6px 12px 8px; border-top: 0.5px solid var(--border); align-items: center; gap: 8px; }
    .new-task-wrap.visible { display: flex; }
    .new-task-input { flex: 1; font-size: 13px; border: none; outline: none; background: transparent; color: var(--text); }
    .new-task-input::placeholder { color: var(--text3); }
    .new-task-save { font-size: 12px; font-weight: 500; color: #534AB7; cursor: pointer; padding: 4px 6px; -webkit-tap-highlight-color: transparent; }
    /* ── Focus section (Today) ──────────────────────────────────── */
    .focus-block { margin: 10px 14px 0; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .focus-header { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 0.5px solid var(--border); }
    .focus-dot { width: 9px; height: 9px; border-radius: 2px; background: #EF9F27; flex-shrink: 0; }
    .focus-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .focus-count { font-size: 11px; color: var(--text3); margin-left: 4px; }
    .focus-empty { padding: 10px 12px; font-size: 12px; color: var(--text3); }
    .focus-task-row { display: flex; align-items: center; gap: 9px; padding: 8px 12px; border-bottom: 0.5px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .focus-task-row:last-child { border-bottom: none; }
    .focus-role-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
    .focus-task-name { font-size: 13px; color: var(--text); flex: 1; }
    .focus-task-name.done { color: var(--text3); text-decoration: line-through; }
    .focus-task-proj { font-size: 10px; color: var(--text3); white-space: nowrap; }

    /* ── This week toggle on tasks ──────────────────────────────── */
    .task-week-toggle { width: 28px; height: 16px; border-radius: 8px; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; padding: 1px; transition: all .15s; cursor: pointer; }
    .task-week-toggle.on { background: #EF9F27; border-color: #EF9F27; justify-content: flex-end; }
    .task-week-toggle .twt-thumb { width: 10px; height: 10px; border-radius: 50%; background: var(--border2); transition: all .15s; }
    .task-week-toggle.on .twt-thumb { background: #fff; }
    /* ── Big 3 edit mode ────────────────────────────────────── */
    .big3-edit-btn { font-size: 11px; font-weight: 500; color: #7F77DD; cursor: pointer; padding: 2px 8px; border-radius: 6px; border: 0.5px solid #AFA9EC; background: transparent; -webkit-tap-highlight-color: transparent; margin-left: auto; }
    .big3-edit-btn:hover { background: rgba(83,74,183,0.1); }
    .big3-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .big3-input-row:last-of-type { margin-bottom: 0; }
    .b3-num { font-size: 11px; font-weight: 600; color: #534AB7; width: 14px; flex-shrink: 0; text-align: center; }
    .b3-input { flex: 1; font-size: 13px; color: #3C3489; background: transparent; border: none; border-bottom: 1px solid #AFA9EC; outline: none; padding: 2px 0; }
    @media (prefers-color-scheme: dark) { .b3-input { color: #CECBF6; border-bottom-color: #534AB7; } }
    .b3-input::placeholder { color: #AFA9EC; }
    .big3-save-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
    .big3-cancel-btn { font-size: 12px; color: #7F77DD; cursor: pointer; padding: 4px 10px; -webkit-tap-highlight-color: transparent; }
    .big3-save-btn { font-size: 12px; font-weight: 500; color: #fff; background: #534AB7; border: none; border-radius: 7px; padding: 5px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; }

  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Loading your day…</p></div>
<div id="toast"></div>

<div id="app">

  <!-- TODAY screen -->
  <div id="screen-today" class="screen active">
    <div class="top-bar">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div class="greeting" id="greeting">Good morning</div>
        <span id="sync-dot"></span>
      </div>
      <div class="date-line" id="date-line">—</div>
      <div class="stats-row">
        <div class="stat-chip"><div class="stat-num" id="stat-done">0</div><div class="stat-lbl">done today</div></div>
        <div class="stat-chip"><div class="stat-num" id="stat-streak">—</div><div class="stat-lbl">best streak</div></div>
        <div class="stat-chip"><div class="stat-num" id="stat-week">—%</div><div class="stat-lbl">week score</div></div>
        <div class="stat-chip"><div class="stat-num" id="stat-quarter" style="color:#3B6D11;">Q1</div><div class="stat-lbl">on track</div></div>
      </div>
    </div>
    <div class="big3-block">
      <div id="big3-title-row" style="display:flex;align-items:center;margin-bottom:8px;">
        <span class="big3-title" style="margin-bottom:0;">THIS WEEK'S BIG 3</span>
        <button class="big3-edit-btn" onclick="renderBig3(true)">Edit</button>
      </div>
      <div id="big3-list"></div>
    </div>
    <div id="sections-container"></div>
    <div id="focus-block" class="focus-block" style="display:none;">
      <div class="focus-header">
        <div class="focus-dot"></div>
        <span class="focus-title">This week's focus</span>
        <span class="focus-count" id="focus-count"></span>
      </div>
      <div id="focus-list"></div>
    </div>
  </div>

  <!-- WEEK screen -->
  <div id="screen-week" class="screen">
    <div class="week-bar">
      <div class="week-nav-row">
        <div class="week-nav-btn" onclick="shiftWeek(-1)">&#8249;</div>
        <div class="week-nav-center">
          <div class="week-nav-title" id="week-nav-title">—</div>
          <div class="week-nav-sub" id="week-nav-sub">—</div>
        </div>

<script>
// ── Date helpers ──────────────────────────────────────────────
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayKey() { return dateKey(new Date()); }

function getMondayOf(d) {
  const day = d.getDay() || 7;
  const mon = new Date(d);
  mon.setDate(d.getDate() - day + 1);
  mon.setHours(0,0,0,0);
  return mon;
}
function getWeekDays(monday) {
  return Array.from({length:7}, (_,i) => { const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
}
function weekLabel(monday) {
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  const startStr = `${months[monday.getMonth()]} ${monday.getDate()}`;
  const endStr   = `${months[sunday.getMonth()]} ${sunday.getDate()}`;
  return `Week of ${startStr} – ${endStr}`;
}
function quarterWeekLabel(d) {
  const jan1 = new Date(d.getFullYear(),0,1);
  const wn   = Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  const q    = Math.ceil((d.getMonth()+1)/3);
  const qw   = wn - (q-1)*13;
  return `Week ${Math.max(1,Math.min(13,qw))} of 13 · Q${q}`;
}
function formatDate(d) {
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mon =['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${mon[d.getMonth()]} ${d.getDate()}`;
}
function getGreeting() {
  const h=new Date().getHours();
  return h<12?'Good morning':h<17?'Good afternoon':'Good evening';
}
function weekKey() {
  const d=new Date(), jan1=new Date(d.getFullYear(),0,1);
  return `${d.getFullYear()}-W${String(Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7)).padStart(2,'0')}`;
}

// ── Storage ───────────────────────────────────────────────────
function loadLog(dk) { try{return JSON.parse(localStorage.getItem(`habitlog-${dk}`)||'{}');}catch{return{};} }
function saveLog(dk,log){ localStorage.setItem(`habitlog-${dk}`,JSON.stringify(log)); }
function loadB3(){ try{return JSON.parse(localStorage.getItem(`big3-${weekKey()}`)||'{}');}catch{return{};} }
function saveB3(done){ localStorage.setItem(`big3-${weekKey()}`,JSON.stringify(done)); }

// ── Big 3 text storage (per week) ────────────────────────────
function b3TextKey(){ return 'big3-text-' + weekKey(); }

function loadBig3Text(){
  try{
    const stored = JSON.parse(localStorage.getItem(b3TextKey()) || 'null');
    if(stored && Array.isArray(stored)) return stored;
  }catch{}
  return CONFIG.big3.map(item => item.text);
}

function saveBig3Text(texts){
  localStorage.setItem(b3TextKey(), JSON.stringify(texts));
}

function syncBig3Text(){
  if(!USE_SUPABASE) return;
  const texts = loadBig3Text();
  syncAppState('big3-text-' + weekKey(), texts);
}

// ── Scores ────────────────────────────────────────────────────
function allIds(){ return CONFIG.sections.flatMap(s=>s.habits.map(h=>h.id)); }
function dayScore(dk){
  const log=loadLog(dk), ids=allIds();
  return ids.length?Math.round(ids.filter(id=>log[id]).length/ids.length*100):0;
}
function weekScoreFor(monday){
  const today=todayKey(), past=getWeekDays(monday).filter(d=>dateKey(d)<=today);
  if(!past.length) return 0;
  const ids=allIds(); let tot=0,done=0;
  past.forEach(d=>{ const l=loadLog(dateKey(d)); tot+=ids.length; done+=ids.filter(id=>l[id]).length; });
  return tot?Math.round(done/tot*100):0;
}

// ── State ─────────────────────────────────────────────────────
let todayLog   = loadLog(todayKey());
let b3done     = loadB3();
let viewMonday = getMondayOf(new Date());


// ── Streak calculation ────────────────────────────────────────
// Counts consecutive days ending today (or yesterday if today not yet done)
// that a given habit was completed.
function calcStreak(habitId){
  const today = new Date();
  let streak = 0;
  let d = new Date(today);

  // Check if done today — if not, start checking from yesterday
  const todayStr = dateKey(d);
  const todayLog = loadLog(todayStr);
  if(!todayLog[habitId]){
    d.setDate(d.getDate() - 1);
  }

  // Walk backwards until we find a day it wasn't done
  for(let i = 0; i < 365; i++){
    const dk = dateKey(d);
    const log = loadLog(dk);
    if(log[habitId]){
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

// Calculate streaks for all habits and cache them
// Returns a map of habitId -> streak count
function calcAllStreaks(){
  const streaks = {};
  CONFIG.sections.forEach(sec => {
    sec.habits.forEach(h => {
      streaks[h.id] = calcStreak(h.id);
    });
  });
  return streaks;
}

}
function renderSections(){
  const c=document.getElementById('sections-container'); c.innerHTML='';
  CONFIG.sections.forEach(sec=>{
    const dc=sec.habits.filter(h=>todayLog[h.id]).length;
    const col=sec._collapsed!==undefined?sec._collapsed:sec.collapsed;

    hdr.addEventListener('click',()=>{ sec._collapsed=!wrap.classList.contains('collapsed'); renderSections(); });
    const body=document.createElement('div'); body.className='sec-body';
    sec.habits.forEach(h=>{
      const done=!!todayLog[h.id], row=document.createElement('div'); row.className='habit-row';
      const streak=calcStreak(h.id);
      row.innerHTML=`<div class="habit-left"><div class="hcheck ${done?'done':''}" style="${done?`background:${sec.color};`:''}"></div><span class="habit-name ${done?'done':''}">${h.name}</span></div><div class="streak-wrap">${streak>0?`<div class="streak-fire" style="background:${sec.color};"></div> ${streak}`:'— 0'}</div>`;

function renderTodayStats(){
  const ids=allIds(), done=ids.filter(id=>todayLog[id]).length;

  renderSections(); renderTodayStats(); syncLog(todayKey(),todayLog);

// ── WEEK render ───────────────────────────────────────────────
const DLBLS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function renderWeekView(){
  const today=todayKey(), days=getWeekDays(viewMonday);
  const isNow=dateKey(getMondayOf(new Date()))===dateKey(viewMonday);
  document.getElementById('week-nav-title').textContent=weekLabel(viewMonday);
  document.getElementById('week-nav-sub').textContent=isNow?quarterWeekLabel(new Date()):'';
  renderWeekStats(days,today);
  renderWeekGrid(days,today);
  renderWeekBig3();
  renderDayScores(days,today);
}

function renderWeekStats(days,today){
  const ids=allIds(), past=days.filter(d=>dateKey(d)<=today);
  let tot=0,done=0;
  past.forEach(d=>{ const l=loadLog(dateKey(d)); tot+=ids.length; done+=ids.filter(id=>l[id]).length; });
  const score=tot?Math.round(done/tot*100):0;
  const lm=new Date(viewMonday); lm.setDate(viewMonday.getDate()-7);
  const last=weekScoreFor(lm), diff=score-last;
  document.getElementById('w-score').textContent=score+'%';
  document.getElementById('w-done').textContent=done;
  const ve=document.getElementById('w-vs');
  ve.textContent=diff===0?'—':diff>0?`+${diff}%`:`${diff}%`;
  ve.style.color=diff>0?'#3B6D11':diff<0?'#A32D2D':'var(--text3)';
}

function renderWeekGrid(days,today){
  document.getElementById('grid-header').innerHTML='<div></div>'+
    days.map((d,i)=>`<div class="grid-day-lbl ${dateKey(d)===today?'is-today':''}">${DLBLS[i]}</div>`).join('');
  const body=document.getElementById('grid-body'); body.innerHTML='';
  CONFIG.sections.forEach(sec=>{
    sec.habits.forEach(h=>{
      const row=document.createElement('div'); row.className='grid-habit-row';
      let html=`<div class="grid-habit-name" style="color:${sec.color};">${h.name}</div>`;
      days.forEach(d=>{
        const dk=dateKey(d), l=loadLog(dk), done=!!l[h.id];
        const isToday=dk===today, isFut=dk>today;
        let cls='gdot';
        if(done) cls+=' done';
        else if(isToday) cls+=' is-today';
        if(isFut) cls+=' is-future';
        const bg=done?`background:${sec.color};`:'';
        const tap=isFut?'':`onclick="toggleGridDot('${h.id}','${dk}','${sec.color}',this)"`;
        html+=`<div class="grid-dot-wrap"><div class="${cls}" style="${bg}" ${tap}></div></div>`;
      });
      row.innerHTML=html; body.appendChild(row);
    });
  });
}

function toggleGridDot(hid,dk,color,el){
  const log=loadLog(dk); log[hid]=!log[hid]; saveLog(dk,log);
  const done=log[hid];
  el.classList.toggle('done',done); el.classList.remove('is-today');
  el.style.background=done?color:'';
  if(dk===todayKey()){ todayLog=loadLog(dk); }
  // Always re-render Today sections so streaks update immediately
  renderSections(); renderTodayStats();
  const days=getWeekDays(viewMonday);
  renderWeekStats(days,todayKey()); renderDayScores(days,todayKey());
  syncLog(dk,log);
}

  const el=document.getElementById('b3-prog-list'); el.innerHTML='';
  const texts = loadBig3Text();
  texts.forEach((text, i) => {
    const id = 'b' + (i+1);
    const done=!!b3done[id], pct=done?100:0;
    const div=document.createElement('div'); div.className='b3-prog-row';
    div.innerHTML=`<div class="b3-prog-info"><div class="b3-prog-name">${text}</div><div class="b3-prog-bg"><div class="b3-prog-fill" style="width:${pct}%;"></div></div></div><div class="b3-prog-pct">${done?'100%':'—'}</div>`;
    el.appendChild(div);
  });
}

function renderDayScores(days,today){
  const c=document.getElementById('day-score-row'); c.innerHTML='';
  days.forEach((d,i)=>{
    const dk=dateKey(d), isToday=dk===today, isPast=dk<=today;
    const score=isPast?dayScore(dk):null;
    let col='var(--text3)';
    if(score!==null){ col=score>=80?'#3B6D11':score>=50?'#BA7517':'#A32D2D'; }
    const chip=document.createElement('div');
    chip.className=`day-score-chip${isToday?' is-today':''}`;
    chip.innerHTML=`<div class="ds-lbl ${isToday?'is-today':''}">${DLBLS[i]}</div><div class="ds-num" style="color:${col};">${score!==null?score+'%':'—'}</div>`;
    c.appendChild(chip);
  });
}

function shiftWeek(dir){
  viewMonday=new Date(viewMonday);
  viewMonday.setDate(viewMonday.getDate()+dir*7);
  renderWeekView();
}


// Task state stored in localStorage keyed by task id
function loadTaskDone(taskId) {
  return localStorage.getItem('task-' + taskId) === 'true';
}
function saveTaskDone(taskId, done) {
  localStorage.setItem('task-' + taskId, done ? 'true' : 'false');
}

// Merge config + custom tasks with localStorage done state
function getTasksDone(project) {
  return getAllTasks(project).map(t => ({...t, done: loadTaskDone(t.id)}));
}

// ── This-week task flags ──────────────────────────────────────
function loadThisWeek(taskId){ return localStorage.getItem('thisweek-'+taskId)==='true'; }
function saveThisWeek(taskId, on){ localStorage.setItem('thisweek-'+taskId, on?'true':'false'); }

// ── Focus section (Today screen) ─────────────────────────────
function renderFocus(){
  const list = document.getElementById('focus-list');
  const block = document.getElementById('focus-block');
  const countEl = document.getElementById('focus-count');
  list.innerHTML = '';

  const roleColors = { work:'#185FA5', self:'#BA7517', life:'#888780' };

  // Collect all flagged tasks across all projects (config + custom)
  const focused = [];
  CONFIG.projects.forEach(proj => {
    getAllTasks(proj).forEach(task => {
      if(loadThisWeek(task.id)){
        focused.push({ task, proj });
      }
    });
  });

  if(!focused.length){
    block.style.display = 'none';
    return;
  }

  block.style.display = '';
  countEl.textContent = focused.filter(f => !loadTaskDone(f.task.id)).length + ' remaining';

  focused.forEach(({task, proj}) => {
    const done = loadTaskDone(task.id);
    const row = document.createElement('div');
    row.className = 'focus-task-row';
    row.innerHTML = `
      <div class="hcheck ${done?'done':''}" style="width:22px;height:22px;${done?`background:${proj.color};`:''}"></div>
      <div class="focus-role-dot" style="background:${proj.color};"></div>
      <span class="focus-task-name ${done?'done':''}">${task.text}</span>
      <span class="focus-task-proj">${proj.name}</span>`;
    row.addEventListener('click', () => {
      const nowDone = !loadTaskDone(task.id);
      saveTaskDone(task.id, nowDone);
      syncTaskDoneState();
      renderFocus();
      // Also refresh projects if visible
      if(document.getElementById('screen-projects').classList.contains('active')) renderProjects();
    });
    list.appendChild(row);
  });
}


// ── Custom task persistence ───────────────────────────────────
// Custom tasks are stored per project in localStorage and Supabase
function customTasksKey(projId){ return 'custom-tasks-' + projId; }

function loadCustomTasks(projId){
  try{ return JSON.parse(localStorage.getItem(customTasksKey(projId)) || '[]'); }
  catch{ return []; }
}

function saveCustomTasks(projId, tasks){
  localStorage.setItem(customTasksKey(projId), JSON.stringify(tasks));
}

function addCustomTask(projId, text){
  const tasks = loadCustomTasks(projId);
  const newTask = { id: projId + '-c' + Date.now(), text, due: '' };
  tasks.push(newTask);
  saveCustomTasks(projId, tasks);
  syncCustomTasks(projId, tasks);
  return newTask;
}

function syncCustomTasks(projId, tasks){
  if(!USE_SUPABASE) return;
  syncAppState('custom-tasks-' + projId, tasks);
}

// Merge custom tasks into all projects from Supabase app_state rows
function mergeCustomTasksFromState(rows){
  rows.forEach(row => {
    if(row.key && row.key.startsWith('custom-tasks-') && Array.isArray(row.value)){
      const projId = row.key.replace('custom-tasks-', '');
      const stored = loadCustomTasks(projId);
      // Merge: prefer Supabase version but keep local if newer ids
      const merged = row.value;
      // Add any local tasks not in supabase (created offline)
      stored.forEach(lt => {
        if(!merged.find(st => st.id === lt.id)) merged.push(lt);
      });
      saveCustomTasks(projId, merged);
    }
  });
}

// Get all tasks for a project (config + custom)
function getAllTasks(proj){
  const custom = loadCustomTasks(proj.id);
  return [...proj.tasks, ...custom];
}

// ── Navigation ────────────────────────────────────────────────
function navigate(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const screen=document.getElementById(`screen-${tab}`);
  const nav=document.getElementById(`nav-${tab}`);
  if(screen){ screen.classList.add('active'); }
  else{ document.getElementById('screen-today').classList.add('active'); document.getElementById('nav-today').classList.add('active'); showToast(`${tab.charAt(0).toUpperCase()+tab.slice(1)} view coming soon`); return; }
  if(nav) nav.classList.add('active');
  if(tab==='today') renderToday();
  if(tab==='week') renderWeekView();
  if(tab==='projects') renderProjects();
}

// ── Supabase ──────────────────────────────────────────────────
function setSyncStatus(s){ document.getElementById('sync-dot').className=s; }

// Habit log sync (per day)
async function syncLog(dk,log){
  if(!USE_SUPABASE) return;
  setSyncStatus('syncing');
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/habit_logs?on_conflict=date`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({date:dk,log,updated_at:new Date().toISOString()})
    });
    setSyncStatus(res.ok?'synced':'error');
  }catch{ setSyncStatus('error'); }
}

// App state sync (tasks, thisweek flags, big3)
// Stores everything in a single app_state table row per key
async function syncAppState(key, value){
  if(!USE_SUPABASE) return;
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/app_state?on_conflict=key`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({key, value, updated_at:new Date().toISOString()})
    });
  }catch(e){ console.log('State sync error:', e); }
}

async function loadAppStateFromSupabase(){
  if(!USE_SUPABASE) return;
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/app_state?select=key,value`,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
    if(!res.ok) return;
    const rows=await res.json();
    rows.forEach(row=>{
      if(row.key==='task_done' && row.value){
        Object.entries(row.value).forEach(([id,done])=>{ localStorage.setItem('task-'+id, done?'true':'false'); });
      }
      if(row.key==='thisweek' && row.value){
        Object.entries(row.value).forEach(([id,on])=>{ localStorage.setItem('thisweek-'+id, on?'true':'false'); });
      }
      if(row.key==='big3' && row.value){
        const wk=weekKey();
        const existing=loadB3();
        const merged=Object.assign({},row.value,existing);
        localStorage.setItem('big3-'+wk, JSON.stringify(merged));
      }
      // Load Big 3 text for current week
      if(row.key===('big3-text-'+weekKey()) && row.value){
        if(Array.isArray(row.value)){
          localStorage.setItem(b3TextKey(), JSON.stringify(row.value));
        }
      }
    });
    // Merge custom tasks from Supabase into localStorage
    mergeCustomTasksFromState(rows);
  }catch(e){ console.log('Load state error:', e); }
}

// Collect all task_done states and push to Supabase
function syncTaskDoneState(){
  const state={};
  CONFIG.projects.forEach(proj=>{
    getAllTasks(proj).forEach(t=>{ state[t.id]=loadTaskDone(t.id); });
  });
  syncAppState('task_done', state);
}

// Collect all thisweek flags and push to Supabase
function syncThisWeekState(){
  const state={};
  CONFIG.projects.forEach(proj=>{
    getAllTasks(proj).forEach(t=>{ state[t.id]=loadThisWeek(t.id); });
  });
  syncAppState('thisweek', state);
}

// Sync big3 done state
function syncBig3State(){
  syncAppState('big3', loadB3());
}

async function loadFromSupabase(){
  if(!USE_SUPABASE) return;
  setSyncStatus('syncing');
  try{
    // Load habit log for today
    const res=await fetch(`${SUPABASE_URL}/rest/v1/habit_logs?date=eq.${todayKey()}&select=log`,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
    if(res.ok){ const d=await res.json(); if(d.length&&d[0].log){ todayLog=d[0].log; saveLog(todayKey(),todayLog); } }
    // Load app state (tasks, thisweek, big3)
    await loadAppStateFromSupabase();
    setSyncStatus('synced');
  }catch{ setSyncStatus('error'); }
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── Midnight reset ────────────────────────────────────────────
function scheduleMidnight(){
  const now=new Date(), mid=new Date(now);
  mid.setDate(now.getDate()+1); mid.setHours(0,0,5,0);
  setTimeout(()=>{ todayLog={}; renderToday(); scheduleMidnight(); }, mid-now);
}

// ── Init ──────────────────────────────────────────────────────
async function init(){
  // 1. Render immediately from localStorage — no waiting, no spinner
  renderToday();
  scheduleMidnight();
  document.getElementById('loading').classList.add('hidden');

  // 2. Sync from Supabase in background, re-render when done
  if(USE_SUPABASE){
    try{
      setSyncStatus('syncing');
      // Load last 30 days of habit logs (for streak calculation)
      const thirtyDaysAgo = new Date();
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
      const fromDate = dateKey(thirtyDaysAgo);
      const histRes = await fetch(
        `${SUPABASE_URL}/rest/v1/habit_logs?date=gte.${fromDate}&select=date,log&order=date.desc`,
        {headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}}
      );
      if(histRes.ok){
        const rows = await histRes.json();
        rows.forEach(row => {
          if(row.date && row.log){
            saveLog(row.date, row.log);
            // Update todayLog if this row is today
            if(row.date === todayKey()) todayLog = row.log;
          }
        });
      }
      // Load app state (tasks, thisweek, big3)
      await loadAppStateFromSupabase();
      setSyncStatus('synced');
      // Re-render with fresh data — streaks now have full history
      renderToday();
      // Also refresh projects/week if visible
      if(document.getElementById('screen-projects').classList.contains('active')) renderProjects();
      if(document.getElementById('screen-week').classList.contains('active')) renderWeekView();
    }catch(e){
      setSyncStatus('error');
      console.log('Sync error:', e);
    }
  }
}
init();

// PROJECTS
// ══════════════════════════════════════════════════════════════


let projFilter = 'all';

function renderProjects() {
  const container = document.getElementById('projects-container');
  container.innerHTML = '';

  const roleGroups = [
    { id: 'work', label: 'WORK PROJECTS', color: '#185FA5' },
    { id: 'self', label: 'SELF PROJECTS', color: '#BA7517' },
    { id: 'life', label: 'LIFE MAINTENANCE', color: '#888780' },
  ];

  roleGroups.forEach(group => {
    let projects = CONFIG.projects.filter(p => p.role === group.id);

    // Apply filter
    if (projFilter === 'work' || projFilter === 'self' || projFilter === 'life') {
      if (group.id !== projFilter) return;
    }
    if (projFilter === 'active') {
      projects = projects.filter(p => p.status === 'active');
    }
    if (projFilter === 'done') {
      projects = projects.filter(p => p.status === 'done');
    }
    if (!projects.length) return;

    const activeCount = projects.filter(p => p.status === 'active').length;
    const groupEl = document.createElement('div');
    groupEl.className = 'role-group';
    groupEl.innerHTML = `<div class="role-group-header">
      <div class="role-group-dot" style="background:${group.color};"></div>
      <div class="role-group-name">${group.label}</div>
      <div class="role-group-count">${activeCount} active</div>
    </div>`;

    projects.forEach(proj => {
      groupEl.appendChild(buildProjectCard(proj));
    });

    container.appendChild(groupEl);
  });
}

function buildProjectCard(proj) {
  const tasks    = getTasksDone(proj);
  const done     = tasks.filter(t => t.done).length;
  const total    = tasks.length;
  const pct      = total ? Math.round(done / total * 100) : 0;
  const collapsed = proj._collapsed !== undefined ? proj._collapsed : proj.collapsed;

  const statusLabels = { active:'Active', paused:'Paused', done:'Done', deck:'On deck' };
  const statusClass  = { active:'s-active', paused:'s-paused', done:'s-done', deck:'s-deck' };

  const card = document.createElement('div');
  card.className = `proj-card${collapsed ? ' collapsed' : ''}`;
  card.id = 'proj-' + proj.id;

  // Header
  const header = document.createElement('div');
  header.className = 'proj-card-header';
  header.innerHTML = `
    <div class="proj-card-left">
      <div class="proj-icon" style="background:${proj.colorLight};">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="2" width="12" height="9" rx="1.5" stroke="${proj.color}" stroke-width="1.2"/>
          <line x1="3" y1="5" x2="11" y2="5" stroke="${proj.color}" stroke-width="1"/>
          <line x1="3" y1="7.5" x2="8" y2="7.5" stroke="${proj.color}" stroke-width="1"/>
        </svg>
      </div>
      <div class="proj-info">
        <div class="proj-name">${proj.name}</div>
        <div class="proj-meta">${proj.meta}</div>
      </div>
    </div>
    <div class="proj-card-right">
      <span class="status-pill ${statusClass[proj.status]}">${statusLabels[proj.status]}</span>
      <span class="proj-chevron ${collapsed ? '' : 'open'}">&#9654;</span>
    </div>`;
  header.addEventListener('click', () => {
    proj._collapsed = !card.classList.contains('collapsed');
    card.classList.toggle('collapsed');
    header.querySelector('.proj-chevron').classList.toggle('open');
  });
  card.appendChild(header);

  // Body
  const body = document.createElement('div');
  body.className = 'proj-card-body';

  // Progress bar
  const prog = document.createElement('div');
  prog.className = 'proj-progress';
  prog.innerHTML = `
    <div class="proj-prog-bg">
      <div class="proj-prog-fill" id="prog-fill-${proj.id}" style="width:${pct}%;background:${proj.color};"></div>
    </div>
    <div class="proj-prog-lbl" id="prog-lbl-${proj.id}">${done} of ${total} tasks done</div>`;
  body.appendChild(prog);

  // Tasks
  tasks.forEach(task => {
    const row = document.createElement('div');
    row.className = 'task-row';
    const soonClass = task.due && (task.due.toLowerCase().includes('week') || task.due === 'Soon' || task.due.includes('Apr')) ? 'soon' : '';
    const thisWeekOn = loadThisWeek(task.id);
    row.innerHTML = `
      <div class="task-check ${task.done ? 'done' : ''}" style="${task.done ? `background:${proj.color};` : ''}"></div>
      <span class="task-text ${task.done ? 'done' : ''}">${task.text}</span>
      ${task.due ? `<span class="task-due ${soonClass}">${task.due}</span>` : ''}
      <div class="task-week-toggle ${thisWeekOn ? 'on' : ''}" title="Add to this week's focus"><div class="twt-thumb"></div></div>`;
    const toggle = row.querySelector('.task-week-toggle');
    toggle.addEventListener('click', e => {
      e.stopPropagation();
      const nowOn = !toggle.classList.contains('on');
      saveThisWeek(task.id, nowOn);
      toggle.classList.toggle('on', nowOn);
      syncThisWeekState();
      renderFocus(); // Always update focus list regardless of active screen
    });
    row.addEventListener('click', () => toggleTask(task.id, proj.id, proj.color, row));
    body.appendChild(row);
  });

  // Add task row
  const addRow = document.createElement('div');
  addRow.className = 'add-task-row';
  addRow.innerHTML = `<div class="add-task-icon">+</div><span class="add-task-text">Add task…</span>`;

  const inputWrap = document.createElement('div');
  inputWrap.className = 'new-task-wrap';
  inputWrap.innerHTML = `
    <input class="new-task-input" placeholder="New task…" type="text"/>
    <span class="new-task-save">Save</span>`;

  addRow.addEventListener('click', () => {
    addRow.style.display = 'none';
    inputWrap.classList.add('visible');
    inputWrap.querySelector('.new-task-input').focus();
  });

  const saveNewTask = () => {
    const input = inputWrap.querySelector('.new-task-input');
    const text = input.value.trim();
    if (text) {
      const newTask = addCustomTask(proj.id, text);
      saveTaskDone(newTask.id, false);
    }
    input.value = '';
    inputWrap.classList.remove('visible');
    addRow.style.display = '';
    renderProjects();
  };

  inputWrap.querySelector('.new-task-save').addEventListener('click', saveNewTask);
  inputWrap.querySelector('.new-task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveNewTask();
    if (e.key === 'Escape') {
      inputWrap.classList.remove('visible');
      addRow.style.display = '';
    }
  });

  body.appendChild(addRow);
  body.appendChild(inputWrap);
  card.appendChild(body);
  return card;
}

function toggleTask(taskId, projId, color, rowEl) {
  const check = rowEl.querySelector('.task-check');
  const text  = rowEl.querySelector('.task-text');
  const isDone = check.classList.contains('done');
  const newDone = !isDone;
  saveTaskDone(taskId, newDone);
  check.classList.toggle('done', newDone);
  text.classList.toggle('done', newDone);
  check.style.background = newDone ? color : '';
  check.style.borderColor = newDone ? 'transparent' : '';
  updateProjectProgress(projId, color);
  syncTaskDoneState();
}

function updateProjectProgress(projId, color) {
  const proj  = CONFIG.projects.find(p => p.id === projId);
  if (!proj) return;
  const tasks = getTasksDone(proj);
  const done  = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  const fill  = document.getElementById('prog-fill-' + projId);
  const lbl   = document.getElementById('prog-lbl-' + projId);
  if (fill) { fill.style.width = pct + '%'; fill.style.background = color; }
  if (lbl)  lbl.textContent = done + ' of ' + total + ' tasks done';
}

function setFilter(filter) {
  projFilter = filter;
  document.querySelectorAll('.fchip').forEach(el => {
    el.classList.toggle('active', el.dataset.filter === filter);
  });
  renderProjects();
}

function showNewProjectDialog() {
  showToast('Project creation coming in next update');
}

// Wire up filter chips
document.getElementById('proj-filters').addEventListener('click', e => {
  if (e.target.classList.contains('fchip')) {
    setFilter(e.target.dataset.filter);
  }
});

// Unregister service workers and clear all caches on every load
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });
}
if('caches' in window){
  caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
}
